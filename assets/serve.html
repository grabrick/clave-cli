<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Clave Remote</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171719;
      --panel: #202024;
      --panel-2: #27252c;
      --text: #f4f0ff;
      --muted: #a8a2b7;
      --soft: #c7b7ff;
      --accent: #b58cff;
      --accent-2: #e7d7ff;
      --danger: #ff7a8a;
      --line: #514462;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }
    .shell {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: max(14px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
      gap: 12px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #1c1b20;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mark {
      width: 28px; height: 28px; border: 1px solid var(--accent);
      display: grid; place-items: center; color: var(--accent-2); border-radius: 6px;
      font-weight: 800;
    }
    h1 { margin: 0; font-size: 15px; line-height: 1.1; }
    .sub { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pill { color: var(--soft); border: 1px solid var(--line); border-radius: 999px; padding: 5px 8px; font-size: 12px; }
    main {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #19191c;
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr;
    }
    #log {
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .empty { color: var(--muted); }
    form {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--panel);
    }
    .row { display: flex; gap: 8px; align-items: center; }
    input, textarea, select, button {
      font: inherit;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #18181b;
      color: var(--text);
    }
    input, textarea, select { width: 100%; padding: 10px; }
    textarea { min-height: 96px; resize: vertical; }
    select { flex: 1; }
    button {
      padding: 10px 12px;
      font-weight: 700;
      color: #171719;
      background: var(--accent);
      border-color: var(--accent);
    }
    button.secondary {
      color: var(--danger);
      background: transparent;
      border-color: #6b3b45;
    }
    button:disabled { opacity: .55; }
    .token { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .hint { color: var(--muted); font-size: 12px; }
    @media (min-width: 760px) {
      .shell { max-width: 860px; margin: 0 auto; }
      #log { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="mark">⌁</div>
        <div>
          <h1>Clave Remote</h1>
          <div class="sub" id="meta">подключение...</div>
        </div>
      </div>
      <div class="pill" id="state">idle</div>
    </header>

    <main>
      <div id="log"><span class="empty">Лог появится здесь после запуска задачи.</span></div>
    </main>

    <form id="runForm">
      <div class="token">
        <input id="token" autocomplete="off" placeholder="Token from clave --serve">
        <button type="button" id="saveToken">OK</button>
      </div>
      <div class="row">
        <select id="mode">
          <option value="discussion">Discussion</option>
          <option value="full">Full</option>
          <option value="tandem">Tandem</option>
        </select>
        <button type="button" class="secondary" id="cancel">Cancel</button>
      </div>
      <textarea id="task" placeholder="Напиши задачу для Clave..."></textarea>
      <button id="run" type="submit">Run</button>
      <div class="hint">Full и Tandem могут менять файлы и запускать команды. Используй только через приватную сеть/Tailscale.</div>
    </form>
  </div>

  <script>
    const tokenInput = document.querySelector('#token');
    const saveToken = document.querySelector('#saveToken');
    const form = document.querySelector('#runForm');
    const mode = document.querySelector('#mode');
    const task = document.querySelector('#task');
    const run = document.querySelector('#run');
    const cancel = document.querySelector('#cancel');
    const log = document.querySelector('#log');
    const state = document.querySelector('#state');
    const meta = document.querySelector('#meta');
    let next = 0;
    let running = false;

    tokenInput.value = localStorage.getItem('clave.remote.token') || new URLSearchParams(location.search).get('token') || '';
    function token() { return tokenInput.value.trim(); }
    function headers() {
      const h = { 'Content-Type': 'application/json' };
      if (token()) h.Authorization = `Bearer ${token()}`;
      return h;
    }
    function append(lines) {
      if (!lines.length) return;
      if (log.querySelector('.empty')) log.textContent = '';
      log.textContent += (log.textContent ? '\n' : '') + lines.join('\n');
      log.scrollTop = log.scrollHeight;
    }
    async function api(path, options = {}) {
      const response = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) } });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || data.error || response.statusText);
      return data;
    }
    async function refreshStatus() {
      if (!token()) return;
      try {
        const s = await api('/status');
        running = !!s.running;
        state.textContent = running ? `${s.mode} · ${s.elapsed}s` : 'idle';
        meta.textContent = `${s.cwd || ''} · ${s.effort || ''}`;
        run.disabled = running;
        cancel.disabled = !running;
      } catch (error) {
        state.textContent = 'locked';
        meta.textContent = error.message;
      }
    }
    async function pollLog() {
      if (!token()) return;
      try {
        const data = await api(`/log?since=${next}`);
        next = data.next ?? next;
        running = !!data.running;
        append(data.lines || []);
      } catch (_) {}
    }
    saveToken.addEventListener('click', () => {
      localStorage.setItem('clave.remote.token', token());
      refreshStatus();
      pollLog();
    });
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      localStorage.setItem('clave.remote.token', token());
      next = 0;
      log.textContent = '';
      try {
        await api('/run', { method: 'POST', body: JSON.stringify({ mode: mode.value, task: task.value }) });
        await refreshStatus();
        await pollLog();
      } catch (error) {
        append([`⏺ Ошибка: ${error.message}`]);
      }
    });
    cancel.addEventListener('click', async () => {
      try { await api('/cancel', { method: 'POST', body: '{}' }); }
      catch (error) { append([`⏺ Ошибка: ${error.message}`]); }
    });
    setInterval(refreshStatus, 1000);
    setInterval(pollLog, 500);
    refreshStatus();
  </script>
</body>
</html>
